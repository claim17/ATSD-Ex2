<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='Detalle de Usuario')"></head>
<body>
<nav th:replace="fragments :: menu"></nav>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Ficha del Usuario</h3>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-3"><strong>ID:</strong></div>
                <div class="col-sm-9" th:text="${usuarioDetalle.id}"></div>
            </div>
            <div class="row mb-3">
                <div class="col-sm-3"><strong>Email:</strong></div>
                <div class="col-sm-9" th:text="${usuarioDetalle.email}"></div>
            </div>
            <div class="row mb-3" th:if="${usuarioDetalle.nombre != null}">
                <div class="col-sm-3"><strong>Nombre:</strong></div>
                <div class="col-sm-9" th:text="${usuarioDetalle.nombre}"></div>
            </div>
        </div>
        <div class="card-footer text-right">
            <a class="btn btn-secondary" th:href="@{/registered}">Volver al listado</a>
        </div>
    </div>
</div>


</body>
</html>
