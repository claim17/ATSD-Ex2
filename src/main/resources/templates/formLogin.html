<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="fragments :: head (titulo='Login')"></head>

    <body>
        <nav th:replace="fragments :: menu"></nav>

        <div class="container"> <div class="row justify-content-center mb-3 mt-5"> <div class="col-auto">
            <h2>Login</h2>
        </div>
        </div>

            <div class="row justify-content-center">
                <div class="col-md-6"> <form method="post" th:action="@{/login}" th:object="${loginData}">
                    <div class="form-group">
                        <label for="eMail">Usuario</label>
                        <input id="eMail" class="form-control" name="eMail" placeholder="Correo electrónico" type="text" th:field="*{eMail}" required/>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input id="password" class="form-control" name="password"  placeholder="Contraseña" type="password" th:field="*{password}" required/>
                    </div>
                    <div class="text-center"> <button type="submit" class="btn btn-primary">Login</button>
                        <a class="btn btn-link" href="/registro">Ir a registro</a>
                    </div>
                </form>
                </div>
            </div>

            <div class="row mt-3 justify-content-center">
                <div class="col-md-6">
                    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
                </div>
            </div>
        </div>

    </body>
</html>
