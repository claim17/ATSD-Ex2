<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: head (titulo='Mis Tareas')"></head>

<body>
<nav th:replace="fragments :: menu"></nav>

<div class="container mt-5"> <div class="row mb-4">
    <div class="col">
        <h2 th:text="'Listado de tareas de ' + ${usuario.nombre}"></h2>
    </div>
</div>

    <div class="row">
        <div class="col">
            <table class="table table-striped table-bordered shadow-sm">
                <thead class="thead-dark">
                <tr>
                    <th>Id</th>
                    <th>Tarea</th>
                    <th>Acción</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="tarea: ${tareas}">
                    <td th:text="${tarea.id}"></td>
                    <td th:text="${tarea.titulo}"></td>
                    <td>
                        <a class="btn btn-primary btn-sm" th:href="@{/tareas/{id}/editar(id=${tarea.id})}">editar</a>
                        <button class="btn btn-danger btn-sm" style="cursor: pointer;"
                                th:onclick="'del(\'/tareas/' + ${tarea.id} + '\')'">borrar</button>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="mt-3">
                <a class="btn btn-primary" th:href="@{/usuarios/{id}/tareas/nueva(id=${usuario.id})}">Nueva tarea</a>
                <a class="btn btn-link" href="/logout">Salir</a>
            </div>
        </div>
    </div>

    <div class="row mt-3" th:if="${!#strings.isEmpty(mensaje)}">
        <div class="col">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        </div>
    </div>
</div>


<script type="text/javascript">
    function del(urlBorrar) {
        if (confirm('¿Estás seguro/a de que quieres borrar la tarea?')) {
            fetch(urlBorrar, {
                method: 'DELETE'
            }).then((res) => location.reload());
        }
    }
</script>
</body>
</html>
