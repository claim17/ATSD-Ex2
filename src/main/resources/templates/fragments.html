<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head (titulo)">
    <meta charset="UTF-8"/>
    <title th:text="${titulo}"></title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<div th:fragment="javascript">
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/popper.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>

    <nav th:fragment="menu" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <a class="navbar-brand" th:href="@{/about}">ToDoList</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item" th:if="${session.idUsuarioLogeado != null}">
                    <a class="nav-link" th:href="@{/usuarios/{id}/tareas(id=${session.idUsuarioLogeado})}">Tareas</a>
                </li>
                <li class="nav-item" th:if="${session.idUsuarioLogeado != null}">
                    <a class="nav-link" th:href="@{/registered}">Usuarios</a>
                </li>
            </ul>

            <ul class="navbar-nav ml-auto">
                <li class="nav-item" th:if="${session.idUsuarioLogeado != null}">
                    <a class="nav-link" th:href="@{/logout}">Cerrar sesión</a>
                </li>
                <li class="nav-item" th:if="${session.idUsuarioLogeado == null}">
                    <a class="nav-link" th:href="@{/login}">Login</a>
                </li>
            </ul>
        </div>
    </nav>
    <a class="navbar-brand" th:href="@{/about}">ToDoList</a>
</div>

</html>
